apiVersion: batch/v1
kind: CronJob
metadata:
  name: media-metadata-renamer
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: renamer
              image: ghcr.io/krishnarajt/tube-archivist-file-renamer:latest
              imagePullPolicy: Always
              env:
                - name: INPUT_FOLDER
                  value: /music/podcasts/test
              
              volumeMounts:
                - name: media-volume
                  mountPath: /music/podcasts/test
              
          volumes:
            - name: media-volume
              hostPath:
                path: /music/podcasts/test
                type: Directory
